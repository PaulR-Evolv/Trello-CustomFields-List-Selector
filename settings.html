<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      background-color: #ffffff;
    }
    
    #loading { padding: 10px; font-style: italic; color: #5e6c84; }
    
    #lists-container { 
      flex: 1; 
      overflow-y: auto; 
      padding: 10px; 
    }
    
    details { 
      background: #F4F5F7; 
      border-radius: 8px; 
      margin-bottom: 8px; 
      padding: 10px; 
      cursor: pointer; 
    }
    
    /* 🚨 UPDATED: Darkened list header text to Trello's premium high-contrast navy */
    summary { 
      font-weight: bold; 
      outline: none; 
      color: #172B4D; 
      font-size: 14px;
    }
    
    /* 🚨 UPDATED: Darkened the custom field text labels for easier reading */
    .cf-item { 
      margin-top: 8px; 
      margin-left: 20px; 
      display: block; 
      color: #42526E; 
      font-weight: 500;
    }
    
    #footer {
      padding: 15px;
      background: #ffffff;
      border-top: 1px solid #dfe1e6; 
      display: none; 
      justify-content: center;
    }

    #save-btn { 
      width: 100%; 
      margin: 0; 
      transition: all 0.2s ease; 
    }

    #save-btn.save-success {
      background-color: #61BD4F !important;
      border-color: #61BD4F !important;
      color: white !important;
    }
    
    #save-btn.save-failed {
      background-color: #EB5A46 !important;
      border-color: #EB5A46 !important;
      color: white !important;
    }
  </style>
</head>
<body>
  <div id="loading">Loading lists and custom fields...</div>
  
  <div id="lists-container"></div>
  
  <div id="footer">
    <button id="save-btn" class="mod-primary">Save Display Settings</button>
  </div>
  
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./settings.js?v=9"></script>
</body>
</html>
