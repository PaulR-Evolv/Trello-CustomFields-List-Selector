<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      background-color: #ffffff;
    }
    
    #loading { padding: 10px; font-style: italic; color: #5e6c84; }
    
    /* Dynamic view panel layout engine */
    .view-panel { 
      flex: 1; 
      overflow-y: auto; 
      padding: 10px; 
    }
    
    details { 
      background: #F4F5F7; 
      border-radius: 8px; 
      margin-bottom: 8px; 
      padding: 10px; 
      cursor: pointer; 
    }
    summary { 
      font-weight: bold; 
      outline: none; 
      color: #172B4D; 
      font-size: 14px;
    }
    
    .cf-item { 
      margin-top: 8px; 
      margin-left: 20px; 
      display: block; 
      color: #42526E; 
      font-weight: 500;
    }
    
    /* 🚨 NEW: Manual Color Grid styling rules */
    .adopt-native-container {
      padding: 5px 5px 12px 5px;
    }
    .help-text {
      display: block;
      font-size: 11px;
      color: #5e6c84;
      font-weight: normal;
      margin-top: 2px;
      margin-left: 22px;
    }
    .color-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #F4F5F7;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .color-field-label {
      font-weight: bold;
      color: #172B4D;
      font-size: 13px;
    }
    .color-select {
      width: 140px;
      background-color: #ffffff;
      border: 1px solid #dfe1e6;
      border-radius: 4px;
      padding: 4px;
      font-weight: 600;
      color: #42526E;
    }
    
    #footer {
      padding: 12px 15px;
      background: #ffffff;
      border-top: 1px solid #dfe1e6; 
      display: none; 
      flex-direction: column;
    }

    #save-btn { 
      width: 100%; 
      margin: 0; 
      transition: all 0.2s ease; 
    }
    
    /* 🚨 NEW: Trello premium layout specifications for the neutral gray configuration option */
    #config-colors-btn {
      width: 100%;
      margin-top: 8px;
      background-color: #F4F5F7;
      color: #172B4D;
      border: 1px solid #dfe1e6;
      font-weight: bold;
      transition: all 0.15s ease;
    }
    #config-colors-btn:hover {
      background-color: #EBECF0;
      color: #091E42;
      border-color: #c1c7d0;
    }

    #save-btn.save-success {
      background-color: #61BD4F !important;
      border-color: #61BD4F !important;
      color: white !important;
    }
    
    #save-btn.save-failed {
      background-color: #EB5A46 !important;
      border-color: #EB5A46 !important;
      color: white !important;
    }
  </style>
</head>
<body>
  <div id="loading">Loading configurations...</div>
  
  <div id="view-display" class="view-panel">
    <div id="lists-container"></div>
  </div>
  
  <div id="view-colors" class="view-panel" style="display: none;">
    <div class="adopt-native-container">
      <label style="color: #172B4D; font-weight: bold;">
        <input type="checkbox" id="adopt-native-checkbox"> Adopt Custom Field Colors
      </label>
      <span class="help-text">Automatically inherits Trello's native dropdown option colors if configured.</span>
    </div>
    <hr style="border: 0; border-top: 1px solid #dfe1e6; margin-bottom: 12px;">
    <div id="colors-container"></div>
  </div>
  
  <div id="footer">
    <button id="save-btn" class="mod-primary">Save Display Settings</button>
    <button id="config-colors-btn">Configure Colors</button>
  </div>
  
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./settings.js?v=10"></script>
</body>
</html>
